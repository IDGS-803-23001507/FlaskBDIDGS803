{% extends "layout.html" %}

{% block container %}

<div class="flex justify-center mt-10">

    <div class="w-[420px] bg-neutral-primary-soft border border-default rounded-base shadow-xs">
        <img 
            class="rounded-t-base w-1/2 mx-auto"
            src="{{ url_for('static', filename='src/userImage.png') }}"
            alt="Foto del maestro"
        />

        <div class="p-6 text-center">

            <span class="inline-flex items-center bg-brand-softer border border-brand-subtle text-fg-brand-strong text-xs font-medium px-1.5 py-0.5 rounded-sm">
                Maestro
            </span>

            <h5 class="mt-3 mb-4 text-2xl font-semibold tracking-tight text-heading">
                {{ maest.nombre }} {{ maest.apellidos }}
            </h5>

            <p class="text-sm mb-2">
                <strong>Email:</strong> {{ maest.email }}
            </p>

            <p class="text-sm mb-6">
                <strong>Especialidad:</strong> {{ maest.especialidad }}
            </p>

            <a href="{{ url_for('index') }}"
            class="text-white bg-red-600 hover:bg-red-700 focus:ring-4 focus:ring-red-300 shadow-xs font-medium rounded-base text-sm px-4 py-2">
            Volver
         </a>
        </div>

    </div>

</div>

{% endblock %}
